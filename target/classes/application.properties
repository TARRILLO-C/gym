# =============================================
# CONFIGURACIÓN DE BASE DE DATOS - MySQL
# =============================================
# spring.datasource.url=jdbc:mysql://localhost:3307/gym_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/gym_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=gym_user
spring.datasource.password=gym_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =============================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# =============================================
# update: actualiza el schema automáticamente sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# CONFIGURACIÓN DEL SERVIDOR
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# CONFIGURACIÓN DE LA APLICACIÓN
# =============================================
spring.application.name=gym-management
